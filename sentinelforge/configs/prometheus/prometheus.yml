global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: identity-svc
    static_configs:
      - targets: ["identity-svc:8000"]
    metrics_path: /metrics

  - job_name: redpanda
    static_configs:
      - targets: ["redpanda:9644"]
