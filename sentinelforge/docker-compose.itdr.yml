services:
  identity-svc:
    build:
      context: ./custom-images/identity-svc
      dockerfile: Dockerfile
    image: sentinelforge/identity-svc:latest
    container_name: identity-svc
    environment:
      CONFIG_PATH: /app/config/config.yaml
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-sentinelforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sentinelforge}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDPANDA_BROKERS: redpanda:9092
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-}
    volumes:
      - ./configs/identity-svc:/app/config:ro
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - sentinelforge-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    user: "1000:1000"

  neo4j:
    image: neo4j:5-community
    container_name: sf-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2G
    volumes:
      - ${SF_DATA_DIR:-/opt/sentinelforge/data}/neo4j:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - sentinelforge-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  envoy:
    image: envoyproxy/envoy:v1.29-latest
    container_name: sf-envoy
    volumes:
      - ./configs/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ${SF_CERTS_DIR:-/opt/sentinelforge/certs}:/certs:ro
    ports:
      - "9443:443"
      - "8080:80"
    depends_on:
      identity-svc:
        condition: service_healthy
    networks:
      - sentinelforge-net
    restart: unless-stopped

networks:
  sentinelforge-net:
    external: true
